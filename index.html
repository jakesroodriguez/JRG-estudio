  <!-- Carga del robot 3D con @splinetool/runtime (independiente de React) -->
  <script type="module">
    const SPLINE_SCENE =
      'https://prod.spline.design/kZDDjO5HuC9GJUM2/scene.splinecode';

    const RUNTIME_URL =
      'https://unpkg.com/@splinetool/runtime@1.9.82/build/runtime.js';

    const ROBOT_ACCENT = '#a78bfa';

    function applyRobotAccentDetails(app) {
      const objects = typeof app.getAllObjects === 'function' ? app.getAllObjects() : [];
      const detailName = /eye|light|led|glow|accent|detail|antenna|core|ring|visor|lens|stripe|tube|wire|energy|screen|panel|glass|neon|rim|bot/i;

      objects.forEach((obj) => {
        try {
          if (obj.intensity != null && obj.color != null) {
            obj.color = ROBOT_ACCENT;
          }

          const name = (obj.name || '').toLowerCase();
          const isDetail = detailName.test(name);
          const material = obj.material;

          if (material?.layers?.length) {
            material.layers.forEach((layer) => {
              if (layer.type === 'fresnel') {
                layer.color = ROBOT_ACCENT;
                if (layer.factor != null) layer.factor = Math.max(layer.factor, 0.4);
              }
              if (layer.type === 'light' || layer.type === 'emissive') {
                layer.color = ROBOT_ACCENT;
              }
              if (isDetail && layer.type === 'color') {
                layer.color = ROBOT_ACCENT;
              }
            });
          }

          if (isDetail && obj.color != null) {
            obj.color = ROBOT_ACCENT;
          }
        } catch (_) {
          /* objeto sin material editable */
        }
      });
    }

    function waitForMount() {
      return new Promise((resolve, reject) => {
        let attempts = 0;
        const timer = setInterval(() => {
          const host = document.getElementById('spline-mount');
          if (host) {
            clearInterval(timer);
            resolve(host);
            return;
          }
          if (++attempts > 120) {
            clearInterval(timer);
            reject(new Error('No se encontró el contenedor 3D'));
          }
        }, 50);
      });
    }

    function showError(host, message) {
      host.innerHTML =
        '<div class="spline-error-msg"><strong>No se pudo cargar el robot 3D</strong><p>' +
        message +
        '</p><p class="spline-error-hint">En Spline: Export → <em>Viewer</em> → Update → copia la URL en index.html (SPLINE_SCENE).</p></div>';
    }

    async function initSpline() {
      const host = await waitForMount();
      const fallback = host.querySelector('.spline-fallback');

      try {
        const { Application } = await import(RUNTIME_URL);
        const canvas = document.createElement('canvas');
        canvas.className = 'spline-canvas';
        host.appendChild(canvas);

        const app = new Application(canvas);

        const resize = () => {
          const w = host.clientWidth;
          const h = host.clientHeight;
          if (w > 0 && h > 0) app.setSize(w, h);
        };

        resize();
        window.addEventListener('resize', resize);

        await app.load(SPLINE_SCENE);
        applyRobotAccentDetails(app);

        if (fallback) fallback.remove();
        canvas.classList.add('is-ready');
        host.classList.add('is-loaded');

        // Simulate mouse movement on mobile to keep the robot alive
        let simTimer = null;
        if (window.innerWidth <= 900) {
          let angle = 0;
          simTimer = setInterval(() => {
            angle += 0.04;
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;
            const rx = window.innerWidth * 0.35;
            const ry = window.innerHeight * 0.25;
            
            const event = new PointerEvent('pointermove', {
              clientX: cx + Math.sin(angle) * rx,
              clientY: cy + Math.cos(angle * 1.3) * ry,
              bubbles: true
            });
            canvas.dispatchEvent(event);
          }, 50);
        }

        // Si detectamos interacción real del usuario, paramos el movimiento sintético
        window.addEventListener('pointermove', (e) => {
          if (e.isTrusted && simTimer) {
            clearInterval(simTimer);
            simTimer = null;
          }
        }, { passive: true });

        // Unlock scroll after the robot's initial zoom animation finishes
        setTimeout(() => {
          document.body.classList.remove('scroll-locked');
        }, 3500);
      } catch (err) {
        console.error('[Spline]', err);
        showError(
          host,
          (err && err.message) ||
            'Revisa tu conexión a internet o la URL de la escena.'
        );
        // Ensure scroll is unlocked even if it fails
        document.body.classList.remove('scroll-locked');
      }
    }

    let started = false;
    const realInit = () => {
      if (started) return;
      started = true;
      initSpline();
    };

    if (window.start3DExperience && window.start3DExperience.triggered) {
      realInit();
    }

    window.start3DExperience = realInit;
  </script>
